name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev imagemagick

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install cython buildozer kivy virtualenv

      - name: Generate Dummy Assets
        run: |
          mkdir -p assets
          # Automatically generate the required image files to satisfy Buildozer
          convert -size 512x512 xc:"#121212" assets/default_icon.png
          convert -size 1080x1920 xc:"#121212" assets/default_presplash.png

      - name: Cache Buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK with Buildozer
        run: buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-apk
          path: bin/*.apk
